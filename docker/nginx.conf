server {
  listen 80;
  server_name _;

  # Trust Cloudflare edge IPs and use visitor IP from CF-Connecting-IP.
  # Cloudflare CIDRs are generated at image build time in:
  # /etc/nginx/cloudflare-realip.conf
  real_ip_header CF-Connecting-IP;
  real_ip_recursive on;
  include /etc/nginx/cloudflare-realip.conf;

  # Security
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html index.htm;

  # Enable sendfile for efficient file serving
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  # Keep-alive connections
  keepalive_timeout 65;
  keepalive_requests 100;

  # Timeout settings for large file uploads
  client_body_timeout 300s;
  client_header_timeout 300s;
  send_timeout 300s;

  # Buffer settings (align max body with typical Cloudflare limits)
  client_body_buffer_size 128k;
  client_max_body_size 100m;
  large_client_header_buffers 4 32k;
  output_buffers 2 32k;

  # Gzip compression - aggressive settings
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon;

  # Cache static assets aggressively (JS, CSS with hash in filename)
  location ~* \.(?:css|js)$ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Vary "Accept-Encoding";
  }

  # Cache fonts
  location ~* \.(?:woff2?|eot|ttf|otf)$ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "*";
  }

  # Cache images
  location ~* \.(?:jpg|jpeg|gif|png|svg|ico|webp|avif)$ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # JSON and XML - shorter cache
  location ~* \.(?:json|xml)$ {
    try_files $uri =404;
    access_log off;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
  }

  # HTML should revalidate quickly so new deploys are picked up
  location ~* \.html$ {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Static export route handling (/about -> /about/index.html)
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  # Service worker - no cache
  location = /firebase-messaging-sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  # Optional: serve robots & manifest directly
  location = /robots.txt { access_log off; log_not_found off; }
  location = /manifest.json { 
    access_log off; 
    log_not_found off;
    add_header Cache-Control "public, max-age=86400";
  }

  # Health endpoint
  location /healthz {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
